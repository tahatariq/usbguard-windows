name: PowerShell Tests & Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'USBGuard-Standalone/**'
      - 'USBGuard-BigFix/**'
      - 'tests/**'
      - '.github/workflows/pester-tests.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Opt into Node.js 24 now — all JS-based actions in this workflow run on Node 24.
# GitHub will force this from June 2026; opting in early surfaces any issues beforehand.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  syntax-check:
    name: PowerShell Syntax Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PowerShell Syntax
        shell: powershell
        run: |
          $errors = 0
          $files = @(
            "USBGuard-Standalone/USBGuard.ps1",
            "USBGuard-Standalone/USBGuard_Advanced.ps1",
            "USBGuard-Standalone/USBGuard_Snapshot.ps1",
            "USBGuard-Standalone/USBGuard_ComplianceReport.ps1",
            "USBGuard-Standalone/Send-ExceptionNotification.ps1",
            "USBGuard-Standalone/Detect-USBGuard.ps1",
            "USBGuard-Standalone/Install-USBGuard.ps1",
            "USBGuard-Standalone/Uninstall-USBGuard.ps1"
          )

          foreach ($file in $files) {
            Write-Host "Checking: $file"
            $content = Get-Content $file -Raw
            $tokens = @()
            $parseErrors = @()
            [System.Management.Automation.PSParser]::Tokenize($content, [ref]$parseErrors) | Out-Null

            if ($parseErrors.Count -gt 0) {
              Write-Error "Syntax errors in $file"
              foreach ($err in $parseErrors) {
                Write-Error "  Line $($err.Token.StartLine): $($err.Message)"
              }
              $errors++
            } else {
              Write-Host "[OK] $file"
            }
          }

          if ($errors -gt 0) {
            exit 1
          }

  pester-tests:
    # windows-2022 ≈ Windows 10/11 (PS 5.1, same registry behaviour)
    # windows-latest = Windows Server 2025
    # Note: windows-2019 was removed — GitHub deprecated those runners in early 2026
    name: Pester Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: syntax-check
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: powershell
        run: |
          if (-not (Get-Module Pester -ListAvailable)) {
            Install-Module -Name Pester -Force -SkipPublisherCheck
          }

      - name: Run Unit Tests
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $config = New-PesterConfiguration
          $config.Run.Path = "tests/unit"
          $config.Run.Exit = $true
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "test-results-unit.xml"
          $config.TestResult.OutputFormat = "NUnitXml"

          Invoke-Pester -Configuration $config

      - name: Run Integration Tests
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $config = New-PesterConfiguration
          $config.Run.Path = "tests/integration"
          $config.Run.Exit = $true
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "test-results-integration.xml"
          $config.TestResult.OutputFormat = "NUnitXml"

          Invoke-Pester -Configuration $config

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: test-results-*.xml

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: pester-tests
    if: always()
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results-*.xml
          check_name: Test Results

  code-analysis:
    name: Code Quality Analysis
    runs-on: windows-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: powershell
        run: |
          if (-not (Get-Module PSScriptAnalyzer -ListAvailable)) {
            Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          }

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          $files = @(
            "USBGuard-Standalone/USBGuard.ps1",
            "USBGuard-Standalone/USBGuard_Advanced.ps1",
            "USBGuard-Standalone/USBGuard_Snapshot.ps1",
            "USBGuard-Standalone/USBGuard_ComplianceReport.ps1",
            "USBGuard-Standalone/Send-ExceptionNotification.ps1",
            "USBGuard-Standalone/Detect-USBGuard.ps1",
            "USBGuard-Standalone/Install-USBGuard.ps1",
            "USBGuard-Standalone/Uninstall-USBGuard.ps1"
          )

          $failCount = 0
          foreach ($file in $files) {
            Write-Host "`n=== Analyzing $file ==="
            # Excluded rules (all intentional design choices — see comments):
            #   PSUseApprovedVerbs                        — pre-existing internal helpers (Ensure-RegPath, Eject-AllRemovableVolumes, Block-UsbPrinters)
            #   PSAvoidUsingWriteHost                     — Write-Host is the stdout capture mechanism used by HTA/WebView2 to read PS output
            #   PSAvoidUsingWMICmdlet                     — WMI method invocation required (Win32_Volume.Dismount()); scripts target PS 5.1
            #   PSUseShouldProcessForStateChangingFunctions — internal helpers not exposed as cmdlets; no -WhatIf/-Confirm pipeline use
            #   PSUseSingularNouns                        — established internal function names (Get-AllowlistEntries, Get-UsbDevices, etc.)
            #   PSUseBOMForUnicodeEncodedFile             — files use UTF-8 without BOM, which is the PS 5.1 default for new scripts
            $excludeRules = @(
                'PSUseApprovedVerbs',
                'PSAvoidUsingWriteHost',
                'PSAvoidUsingWMICmdlet',
                'PSUseShouldProcessForStateChangingFunctions',
                'PSUseSingularNouns',
                'PSUseBOMForUnicodeEncodedFile'
            )
            $results = Invoke-ScriptAnalyzer -Path $file -Severity Warning -ExcludeRule $excludeRules

            if ($results) {
              Write-Host "Issues found:"
              $results | Format-Table -AutoSize
              $failCount += $results.Count
            } else {
              Write-Host "[OK] No issues found"
            }
          }

          if ($failCount -gt 0) {
            Write-Error "PSScriptAnalyzer found $failCount issue(s)"
            exit 1
          }

  registry-validation:
    name: Registry Path Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Registry Paths
        shell: powershell
        run: |
          Write-Host "Validating registry paths referenced in code..."

          $mainScript = Get-Content "USBGuard-Standalone/USBGuard.ps1" -Raw

          # Check for required registry paths
          $checks = @{
            'HKLM:\SYSTEM\CurrentControlSet\Services\USBSTOR' = 'L1 USB Storage driver'
            'HKLM:\SYSTEM\CurrentControlSet\Control\StorageDevicePolicies' = 'L2 Storage policies'
            'HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeviceInstall\Restrictions' = 'L3 Device restrictions'
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer' = 'L4 AutoPlay policy'
            'HKLM:\SYSTEM\CurrentControlSet\Services\thunderbolt' = 'L6 Thunderbolt'
            'HKLM:\SYSTEM\CurrentControlSet\Services\WpdFilesystemDriver' = 'L7 WPD/MTP/PTP'
            'HKLM:\SYSTEM\CurrentControlSet\Services\sdbus' = 'L8 SD Card reader'
            'HKLM:\SYSTEM\CurrentControlSet\Services\BthOBEX' = 'L9 Bluetooth OBEX'
            'HKLM:\SYSTEM\CurrentControlSet\Services\1394ohci' = 'L10 FireWire'
          }

          $issues = 0
          foreach ($path in $checks.Keys) {
            if ($mainScript -match [regex]::Escape($path)) {
              Write-Host "[OK] $($checks[$path]): $path"
            } else {
              Write-Host "[MISSING] $($checks[$path]): $path"
              $issues++
            }
          }

          # Check GUID validity (should match {XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX} format)
          $guidPattern = '\{[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}\}'
          $guids = [regex]::Matches($mainScript, $guidPattern)
          Write-Host "Found $($guids.Count) GUIDs in script"

          if ($issues -gt 0) {
            Write-Host "FAIL: $issues registry path(s) missing from script"
            exit 1
          }

          Write-Host "All registry paths validated."

  documentation-check:
    name: Documentation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Documentation
        run: |
          echo "Validating documentation..."

          files=(
            "README.md"
            "USBGuard-Standalone/README.md"
            "CODE_VALIDATION.md"
            "CLAUDE.md"
            "docs/known-bypass-vectors.md"
            "docs/siem-integration.md"
            "docs/intune-oma-uri.md"
            "docs/multi-tenant-ou-policy.md"
          )

          missing=0
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "[OK] Found: $file ($(wc -l < "$file") lines)"
            else
              echo "[MISSING] $file"
              missing=$((missing + 1))
            fi
          done

          if [ $missing -gt 0 ]; then
            echo "FAIL: $missing documentation file(s) missing"
            exit 1
          fi

          echo "All documentation files present."

  webview2-tests:
    name: WebView2 Tests (C# xUnit + JS Jest)
    runs-on: windows-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js (for Jest)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: C# xUnit — build and run InputValidator tests
        shell: powershell
        run: |
          dotnet test `
            USBGuard-Standalone/USBGuard-WebView2/tests/USBGuard.Tests.csproj `
            --logger "trx;LogFileName=test-results-webview2-csharp.trx" `
            --results-directory test-results-webview2 `
            -v normal

      - name: JS Jest — install dependencies and run
        shell: powershell
        run: |
          cd USBGuard-Standalone/USBGuard-WebView2/tests
          npm install
          # Jest outputs to stdout; convert to JUnit for publish step
          npx jest --reporters=default --reporters=jest-junit `
            --testResultsProcessor=jest-junit 2>&1 | Tee-Object -Variable jestOutput
          $exitCode = $LASTEXITCODE
          Write-Host $jestOutput
          exit $exitCode
        env:
          JEST_JUNIT_OUTPUT_FILE: ../../../test-results-webview2/test-results-webview2-jest.xml

      - name: Upload WebView2 Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-webview2
          path: test-results-webview2/

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [syntax-check, pester-tests, publish-test-results, code-analysis, registry-validation, documentation-check, webview2-tests]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "=== USB-Block CI/CD Pipeline Summary ==="
          echo ""
          echo "Syntax Check:          ${{ needs.syntax-check.result }}"
          echo "Unit/Integration Tests: ${{ needs.pester-tests.result }}"
          echo "Code Analysis:         ${{ needs.code-analysis.result }}"
          echo "Registry Validation:   ${{ needs.registry-validation.result }}"
          echo "Documentation:         ${{ needs.documentation-check.result }}"
          echo "WebView2 Tests:        ${{ needs.webview2-tests.result }}"
          echo ""

          if [ "${{ needs.syntax-check.result }}" = "failure" ] || \
             [ "${{ needs.pester-tests.result }}" = "failure" ] || \
             [ "${{ needs.code-analysis.result }}" = "failure" ] || \
             [ "${{ needs.registry-validation.result }}" = "failure" ] || \
             [ "${{ needs.webview2-tests.result }}" = "failure" ]; then
            echo "Pipeline FAILED"
            exit 1
          else
            echo "All checks passed."
          fi
